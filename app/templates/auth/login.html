{% extends "base.html" %}

{% block title %}Log In - ProjectAssign{% endblock %}

{% block content %}
<div class="auth-card-container">
    <div class="auth-card">
        <div class="auth-card-header">
            <div class="auth-brand">PA</div>
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Enter your credentials to access your manager dashboard</p>
        </div>
        
        <form class="auth-form" method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username_or_email">Username or Email</label>
                <div class="input-wrapper">
                    <input type="text" id="username_or_email" name="username_or_email" placeholder="manager or manager@projectassign.com" required autofocus>
                </div>
            </div>
            
            <div class="form-group">
                <div class="label-wrapper">
                    <label for="password">Password</label>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>
        
        <div class="auth-card-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
